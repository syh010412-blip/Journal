name: 주간 일기 분석 리포트

on:
  schedule:
    # 매주 일요일 오전 9시 UTC = 오후 6시 KST
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      start_date:
        description: '분석 시작일 (YYYY-MM-DD). 비워두면 최근 7일'
        required: false
      end_date:
        description: '분석 종료일 (YYYY-MM-DD). 비워두면 오늘'
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .

      - name: 의존성 설치
        run: npm ci

      - name: 일기 분석 리포트 생성
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ] && [ -n "${{ github.event.inputs.end_date }}" ]; then
            node src/diary-index.js "${{ github.event.inputs.start_date }}" "${{ github.event.inputs.end_date }}"
          else
            node src/diary-index.js
          fi
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_DIARY_DB_ID: 213a3bd9-3958-811a-bdb0-000bb131e523
          NOTION_DIARY_REPORT_DB_ID: 359a3bd9-3958-8029-9ac6-f00fc8ceaa78
