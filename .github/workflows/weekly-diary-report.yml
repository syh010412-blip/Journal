name: 주간 일기 분석 리포트

on:
  schedule:
    # 매주 일요일 오전 9시 UTC = 오후 6시 KST
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      start_date:
        description: '분석 시작일 (YYYY-MM-DD). 비워두면 최근 7일'
        required: false
      end_date:
        description: '분석 종료일 (YYYY-MM-DD). 비워두면 오늘'
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 일기 분석 리포트 생성
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ] && [ -n "${{ github.event.inputs.end_date }}" ]; then
            node src/diary-index.js "${{ github.event.inputs.start_date }}" "${{ github.event.inputs.end_date }}"
          else
            node src/diary-index.js
          fi
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
